name: Scheduled Python Task (9:25 Daily)

on:
  schedule:
    # 北京时间9:25 → UTC 1:25
    - cron: '25 1 * * *'
  workflow_dispatch:  # 手动触发开关

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # 兼容pandas的稳定版本

      # 仅安装需要的第三方库：requests + pandas
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Run Python script (send1.py)
        run: python send1.py
