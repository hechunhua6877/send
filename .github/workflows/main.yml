# 工作流名称
name: Scheduled Python Task (9:25 Daily)

# 触发条件：定时 + 手动触发（方便测试）
on:
  schedule:
    # 北京时间每天9:25执行 → UTC时间1:25 → Cron: 25 1 * * *
    - cron: '25 1 * * *'
  # 手动触发开关（在Actions页面可手动运行测试）
  workflow_dispatch:

# 执行任务
jobs:
  run-python-script:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取仓库代码
      - name: Check out repository code
        uses: actions/checkout@v4

      # 步骤2：设置Python环境（匹配你的代码版本）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # 可改为3.9/3.11等

      # 步骤3：安装依赖（如有需要，比如schedule/requests等）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 示例：安装schedule库（如果你的代码用到）
          # pip install schedule
          # 如果有requirements.txt，用这行：
          # pip install -r requirements.txt

      # 步骤4：执行Python代码（替换为你的文件名，比如main.py）
      - name: Run Python script at 9:25 (Beijing Time)
        run: python main.py
